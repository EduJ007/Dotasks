<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo Leveling | Quest Log</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sl-blue: #00d4ff;
            --sl-dark-blue: #0a192f;
            --sl-purple: #7000ff;
            --sl-black: #020617;
            --sl-border: rgba(0, 212, 255, 0.3);
            --bg-gradient: linear-gradient(180deg, #020617 0%, #0a192f 100%);
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: #e2e8f0;
            margin: 0;
            font-family: 'Rajdhani', sans-serif;
            text-transform: uppercase;
        }

        /* --- Custom Scrollbar --- */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--sl-black); }
        ::-webkit-scrollbar-thumb { background: var(--sl-blue); border-radius: 4px; }

        /* --- Loading Screen (Monarch Style) --- */
        #loading-screen {
            position: fixed; inset: 0;
            background: var(--sl-black);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 5000;
        }
        .spinner {
            width: 60px; height: 60px;
            border: 3px solid transparent;
            border-top-color: var(--sl-blue);
            border-bottom-color: var(--sl-purple);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- Dashboard UI --- */
        .main-container { max-width: 1800px; margin: 40px auto; padding: 0 20px; }

        .dashboard-header {
            display: flex; justify-content: space-between;
            background: rgba(10, 25, 47, 0.8);
            padding: 30px;
            border-radius: 2px;
            border: 2px solid var(--sl-blue);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
            backdrop-filter: blur(10px);
            clip-path: polygon(0 0, 100% 0, 100% 90%, 95% 100%, 0 100%);
        }

        h1 { font-family: 'Orbitron', sans-serif; color: var(--sl-blue); letter-spacing: 4px; margin: 0; text-shadow: 0 0 10px var(--sl-blue); }

        /* --- Avatar SL Style --- */
        #user-avatar {
            width: 50px; height: 50px;
            border: 2px solid var(--sl-blue);
            box-shadow: 0 0 15px var(--sl-blue);
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            background-color: var(--sl-black) !important;
        }

        .btn-logout { 
            background: transparent; color: #ff4d4d; border: 1px solid #ff4d4d; 
            padding: 4px 10px; cursor: pointer; font-weight: bold;
            transition: 0.3s;
        }
        .btn-logout:hover { background: #ff4d4d; color: white; }

        /* --- Inputs e Botões --- */
        .input-group { background: transparent; border: none; padding: 0; }
        .input-group input { 
            background: rgba(2, 6, 23, 0.8); border: 1px solid var(--sl-blue); 
            color: white; padding: 12px; font-family: 'Rajdhani'; font-size: 1.1rem;
        }
        .input-group button { 
            background: var(--sl-blue); color: var(--sl-black); 
            font-weight: bold; border: none; transition: 0.3s;
        }
        .input-group button:hover { background: white; box-shadow: 0 0 20px white; }

        /* --- Tabela de Quests --- */
        .table-wrapper {
            background: rgba(2, 6, 23, 0.6);
            margin-top: 20px; padding: 20px; border: 1px solid var(--sl-border);
        }
        table { width: 100%; border-collapse: separate; border-spacing: 0 5px; }
        th { color: var(--sl-blue); font-family: 'Orbitron'; font-size: 0.8rem; padding: 15px; }
        td { background: rgba(10, 25, 47, 0.5); border-top: 1px solid var(--sl-border); border-bottom: 1px solid var(--sl-border); padding: 12px; }
        .sticky-col { background: var(--sl-dark-blue) !important; color: white; border-left: 3px solid var(--sl-blue); }

        /* --- Checkbox SL Style --- */
        input[type="checkbox"] {
            appearance: none; width: 18px; height: 18px; border: 1px solid var(--sl-blue);
            cursor: pointer; position: relative;
        }
        input[type="checkbox"]:checked { background: var(--sl-blue); box-shadow: 0 0 10px var(--sl-blue); }
        input[type="checkbox"]:checked::after { content: '✔'; position: absolute; color: black; font-size: 14px; left: 2px; top: -2px; }

        /* --- Gráfico --- */
        #percentage-label { font-family: 'Orbitron'; color: var(--sl-blue); text-shadow: 0 0 10px var(--sl-blue); }

        /* --- Auth Card SL --- */
        .auth-card { 
            background: var(--sl-black); border: 2px solid var(--sl-blue); 
            color: white; box-shadow: 0 0 40px rgba(0, 212, 255, 0.2);
            clip-path: polygon(10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%, 0 10%);
        }
        .btn-primary { 
            background: var(--sl-blue); color: black; font-family: 'Orbitron'; 
            letter-spacing: 2px; border-radius: 0;
        }

        #edit-profile { background: var(--sl-black); border: 1px solid var(--sl-blue); color: white; }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="spinner"></div>
        <p style="font-family: 'Orbitron'; letter-spacing: 3px; color: var(--sl-blue);">ACCESSING SYSTEM...</p>
    </div>

    <div id="custom-alert" class="alert-hidden">
        <div class="alert-content" style="background: var(--sl-black); border: 1px solid var(--sl-blue); color: white;">
            <span id="alert-message"></span>
        </div>
    </div>

    <div id="auth-container" class="auth-overlay" style="display: none;">
        <div class="auth-card">
            <h2 style="font-family: 'Orbitron'; color: var(--sl-blue); text-align: center;">USER AUTHENTICATION</h2>
            <div class="input-field"><input type="email" id="email" placeholder="E-MAIL"></div>
            <div class="input-field"><input type="password" id="password" placeholder="PASSWORD"></div>
            <button class="btn-primary" onclick="login()">LOG IN</button>
            <button class="btn-google" onclick="loginGoogle()" style="background: white; color: black;">GOOGLE SYNC</button>
            <p style="text-align:center;">NEW PLAYER? <a href="#" onclick="toggleAuth(true)" style="color: var(--sl-blue);">REGISTER</a></p>
        </div>
    </div>

    <div class="main-container" id="app-content" style="display: none;">
        <header class="dashboard-header">
            <div class="header-left">
                <h1>PLAYER STATUS</h1>
                <div class="user-info">
                    <div style="display: flex; align-items: center; gap: 15px; margin-top: 15px;">
                        <div id="user-avatar" onclick="abrirConfigPerfil()"></div>
                        <div>
                            <span id="user-email-display" style="font-family: 'Orbitron'; color: var(--sl-blue);"></span>
                            <br>
                            <button onclick="logout()" class="btn-logout">ABANDON QUEST</button>
                        </div>
                    </div>
                    <div id="edit-profile" style="display:none; padding: 15px; margin-top: 10px; position: absolute; z-index: 100;">
                        <input type="text" id="new-photo-url" placeholder="IMAGE URL" style="background: #111; color: white; border: 1px solid var(--sl-blue); padding: 5px;">
                        <button onclick="salvarFoto()" style="background: var(--sl-blue); padding: 5px; margin-top: 5px; cursor: pointer;">UPDATE IMAGE</button>
                    </div>
                </div>

               <div id="quest-creation-zone" style="margin-top: 30px;">
                    <button id="btn-show-input" onclick="toggleInput(true)" style="background: var(--sl-blue); color: black; border: none; padding: 10px 20px; font-family: 'Orbitron'; cursor: pointer; font-weight: bold;">+ NEW QUEST</button>
                    
                    <div id="input-container" style="display: none; align-items: center; gap: 10px;">
                        <input type="text" id="habitInput" placeholder="DESCRIBE YOUR QUEST..." style="background: rgba(2, 6, 23, 0.8); border: 1px solid var(--sl-blue); color: white; padding: 10px; font-family: 'Rajdhani'; width: 250px;">
                        <button onclick="adicionarHabito()" style="background: var(--sl-blue); color: black; border: none; padding: 10px 15px; cursor: pointer; font-weight: bold;">ACCEPT</button>
                        <button onclick="toggleInput(false)" style="background: #ff4d4d; color: white; border: none; padding: 10px 15px; cursor: pointer;">CANCEL</button>
                    </div>
                </div>
            </div>
            
            <div class="header-right">
                <div class="chart-container">
                    <canvas id="progressChart"></canvas>
                    <div id="percentage-label">0%</div>
                    <p style="text-align: center; font-size: 0.7rem; margin-top: 5px; color: var(--sl-blue);">QUEST COMPLETION</p>
                </div>
            </div>
        </header>

        <div class="table-wrapper">
            <h3 style="font-family: 'Orbitron'; color: var(--sl-blue); margin-bottom: 20px;">[ DAILY QUEST LOG ]</h3>
            <table>
                <thead>
                    <tr id="header-row"><th class="sticky-col">QUEST NAME</th></tr>
                </thead>
                <tbody id="habit-grid"></tbody>
            </table>
        </div>
    </div>

    <script type="module" src="index.js"></script>
</body>
</html>
