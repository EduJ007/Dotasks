<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoTasks | Performance</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --bg: #f8fafc;
            --white: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            background-color: var(--bg);
            margin: 0;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            color: var(--text-main);
        }

        /* --- UI Geral --- */
        .main-container { max-width: 1400px; margin: 20px auto; padding: 0 20px; }
        
        /* --- Top Bar Moderna --- */
        .top-bar {
            background: var(--white);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        .user-profile-area {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            position: relative;
            padding: 5px 10px;
            border-radius: 12px;
            transition: background 0.2s;
        }

        .user-profile-area:hover { background: #f1f5f9; }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            object-fit: cover;
            border: 2px solid #e2e8f0;
        }

        /* --- Dashboard Header --- */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: var(--white);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .header-controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            background: #f1f5f9;
            padding: 8px;
            border-radius: 12px;
        }

        .input-group input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px;
            outline: none;
            font-size: 1rem;
        }

        .input-group button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        /* --- Tabela --- */
        .table-wrapper {
            background: var(--white);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; color: var(--text-muted); font-size: 12px; text-transform: uppercase; padding: 15px; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; text-align: center; }
        
        .sticky-col { 
            position: sticky; left: 0; background: white; 
            z-index: 5; min-width: 200px; text-align: left; 
            font-weight: 600; padding-left: 25px;
        }

        /* --- Checkbox Custom --- */
        input[type="checkbox"] {
            width: 20px; height: 20px; cursor: pointer;
            accent-color: var(--accent);
        }

        /* --- Modais de Auth (Mantidos e Melhorados) --- */
        .auth-overlay {
            position: fixed; inset: 0;
            background: #0f172a;
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
        }

        .auth-card {
            background: white; width: 90%; max-width: 400px;
            padding: 40px; border-radius: 24px;
        }

        /* Estilos do Dropdown de Perfil */
        .profile-menu {
            position: absolute; top: 60px; right: 0;
            background: white; border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            width: 200px; display: none; flex-direction: column;
            overflow: hidden; z-index: 100;
        }

        .profile-menu button {
            padding: 12px 20px; border: none; background: white;
            text-align: left; cursor: pointer; font-size: 14px;
        }

        .profile-menu button:hover { background: #f1f5f9; }
        .btn-logout-menu { color: #ef4444; border-top: 1px solid #f1f5f9 !important; }

        #custom-alert {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 3000; transition: 0.3s;
        }
        .alert-hidden { opacity: 0; visibility: hidden; transform: translate(-50%, -20px); }
        .alert-content { background: #1e293b; color: white; padding: 12px 24px; border-radius: 50px; }
    </style>
</head>
<body>

    <div id="custom-alert" class="alert-hidden">
        <div class="alert-content">
            <span id="alert-message"></span>
        </div>
    </div>

    <div id="auth-container" class="auth-overlay">
        <div class="auth-card">
            <div class="auth-header" style="text-align: center; margin-bottom: 20px;">
                <div style="font-size: 40px;">🎯</div>
                <h2>Fazer Login</h2>
            </div>
            <div class="input-field">
                <label>E-mail</label><br>
                <input type="email" id="email" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;">
            </div><br>
            <div class="input-field">
                <label>Senha</label><br>
                <input type="password" id="password" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;">
            </div><br>
            <button class="btn-primary" onclick="login()" style="width:100%; padding:12px; background:#3b82f6; color:white; border:none; border-radius:8px; cursor:pointer;">Entrar</button>
            <button onclick="loginGoogle()" style="width:100%; margin-top:10px; padding:12px; background:white; border:1px solid #ddd; border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px;">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="18"> Google
            </button>
            <p style="text-align:center; font-size:14px;">Não tem conta? <a href="#" onclick="toggleAuth(true)">Criar conta</a></p>
        </div>
    </div>

    <div id="signup-container" class="auth-overlay" style="display: none;">
        <div class="auth-card">
            <h2>Criar Conta</h2>
            <input type="text" id="userName" placeholder="Nome" style="width:100%; padding:10px; margin-bottom:10px;">
            <input type="email" id="signup-email" placeholder="E-mail" style="width:100%; padding:10px; margin-bottom:10px;">
            <input type="password" id="signup-password" placeholder="Senha" style="width:100%; padding:10px; margin-bottom:10px;">
            <button class="btn-primary" onclick="signup()" style="width:100%; padding:12px; background:#3b82f6; color:white; border:none; border-radius:8px;">Cadastrar</button>
            <p style="text-align:center;"><a href="#" onclick="toggleAuth(false)">Já tenho conta</a></p>
        </div>
    </div>

    <div class="main-container" id="app-content" style="display: none;">
        <nav class="top-bar">
            <div style="font-weight: 800; font-size: 1.5rem; color: var(--primary);">DoTasks</div>
            
            <div class="user-profile-area" onclick="toggleProfileMenu()">
                <div id="user-display-name" style="font-weight: 600;">Carregando...</div>
                <img id="user-photo" class="user-avatar" src="" alt="👤">
                
                <div class="profile-menu" id="profile-menu">
                    <button onclick="changeName()">Alterar Nome</button>
                    <button class="btn-logout-menu" onclick="logout()">Sair da Conta</button>
                </div>
            </div>
        </nav>

        <div class="dashboard-grid">
            <div class="card">
                <h3>Minhas Tarefas do Mês</h3>
                <div class="input-group">
                    <input type="text" id="habitInput" placeholder="O que vamos focar hoje?">
                    <button onclick="adicionarHabito()">Adicionar</button>
                </div>
            </div>

            <div class="card" style="display: flex; align-items: center; justify-content: center; padding: 15px;">
                <div class="chart-container">
                    <canvas id="progressChart"></canvas>
                    <div id="percentage-label">0%</div>
                </div>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr id="header-row">
                        <th class="sticky-col">Tarefa</th>
                    </tr>
                </thead>
                <tbody id="habit-grid"></tbody>
            </table>
        </div>
    </div>

    <script type="module" src="index.js"></script>
</body>
</html>
