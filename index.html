<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo Leveling | Quest Log</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sl-blue: #00d4ff;
            --sl-dark-blue: #0a192f;
            --sl-purple: #7000ff;
            --sl-black: #020617;
            --sl-border: rgba(0, 212, 255, 0.3);
            --bg-gradient: linear-gradient(180deg, #020617 0%, #0a192f 100%);
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: #e2e8f0;
            margin: 0;
            font-family: 'Rajdhani', sans-serif;
            text-transform: uppercase;
            overflow-x: hidden;
        }

        /* --- Scrollbar --- */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--sl-black); }
        ::-webkit-scrollbar-thumb { background: var(--sl-blue); border-radius: 4px; }

        /* --- Loading Screen --- */
        #loading-screen {
            position: fixed; inset: 0;
            background: var(--sl-black);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 9999;
        }
        .spinner {
            width: 60px; height: 60px;
            border: 3px solid transparent;
            border-top-color: var(--sl-blue);
            border-bottom-color: var(--sl-purple);
            border-radius: 50%;
            animation: spin 1s infinite linear;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- Auth Overlay & Card --- */
        #auth-container {
            position: fixed; inset: 0;
            background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            z-index: 8000;
        }

        .auth-card {
            background: var(--sl-black);
            border: 2px solid var(--sl-blue);
            padding: 40px;
            width: 100%; max-width: 380px;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.2);
            clip-path: polygon(10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%, 0 10%);
            text-align: center;
        }

        .auth-card h2 { font-family: 'Orbitron'; color: var(--sl-blue); margin-bottom: 30px; letter-spacing: 2px; }

        .input-field { margin-bottom: 20px; text-align: left; }
        .input-field label { color: var(--sl-blue); font-size: 0.7rem; font-family: 'Orbitron'; margin-left: 5px; }
        .input-field input {
            width: 100%; background: rgba(10, 25, 47, 0.8); border: 1px solid var(--sl-border);
            border-bottom: 2px solid var(--sl-blue); padding: 12px; color: white;
            font-family: 'Rajdhani'; font-size: 1rem; outline: none; box-sizing: border-box;
        }

        .btn-auth {
            width: 100%; background: var(--sl-blue); color: black; border: none;
            padding: 12px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer;
            transition: 0.3s; margin-top: 10px;
        }
        .btn-auth:hover { background: white; box-shadow: 0 0 15px white; }
        
        .btn-google {
            width: 100%; background: transparent; color: white; border: 1px solid white;
            padding: 10px; margin-top: 15px; font-family: 'Orbitron'; font-size: 0.8rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        /* --- Alerta --- */
        #custom-alert {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 10000; display: none; background: var(--sl-black);
            border: 2px solid var(--sl-blue); min-width: 280px;
            clip-path: polygon(5% 0, 100% 0, 100% 80%, 95% 100%, 0 100%, 0 20%);
        }
        .alert-header { background: var(--sl-blue); color: black; padding: 4px; font-family: 'Orbitron'; font-size: 0.7rem; text-align: center; }
        .alert-content { padding: 15px; text-align: center; font-weight: bold; }

        /* --- Dashboard UI --- */
        .main-container { max-width: 1600px; margin: 40px auto; padding: 0 20px; }
        .dashboard-header {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(10, 25, 47, 0.8); padding: 25px;
            border: 2px solid var(--sl-blue); backdrop-filter: blur(10px);
            clip-path: polygon(0 0, 100% 0, 100% 90%, 98% 100%, 0 100%);
        }
        h1 { font-family: 'Orbitron'; color: var(--sl-blue); letter-spacing: 3px; margin: 0; font-size: 1.5rem; }

        #user-avatar {
            width: 50px; height: 50px; border: 2px solid var(--sl-blue);
            box-shadow: 0 0 10px var(--sl-blue); font-family: 'Orbitron';
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        .btn-logout { 
            background: transparent; color: #ff4d4d; border: 1px solid #ff4d4d; 
            padding: 4px 10px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.7rem; margin-top: 5px;
        }

        /* --- Tabela --- */
        .table-wrapper {
            background: rgba(2, 6, 23, 0.6); margin-top: 20px; padding: 20px; 
            border: 1px solid var(--sl-border); overflow-x: auto;
        }
        table { width: 100%; border-collapse: separate; border-spacing: 0 5px; }
        th { color: var(--sl-blue); font-family: 'Orbitron'; font-size: 0.7rem; padding: 10px; }
        td { background: rgba(10, 25, 47, 0.5); padding: 10px; text-align: center; border-top: 1px solid var(--sl-border); }
        .sticky-col { 
            background: var(--sl-dark-blue) !important; color: white; 
            border-left: 3px solid var(--sl-blue); min-width: 180px; text-align: left;
            position: sticky; left: 0; z-index: 10;
        }

        /* --- Checkbox SL --- */
        input[type="checkbox"] {
            appearance: none; width: 18px; height: 18px; border: 1px solid var(--sl-blue);
            cursor: pointer; position: relative;
        }
        input[type="checkbox"]:checked { background: var(--sl-blue); box-shadow: 0 0 8px var(--sl-blue); }
        input[type="checkbox"]:checked::after { content: '✔'; position: absolute; color: black; font-size: 12px; left: 3px; top: -1px; }

        .chart-container { position: relative; width: 80px; height: 80px; }
        #percentage-label { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-family: 'Orbitron'; color: var(--sl-blue); font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="spinner"></div>
        <p style="font-family: 'Orbitron'; letter-spacing: 2px; color: var(--sl-blue); margin-top: 15px;">INITIALIZING SYSTEM...</p>
    </div>

    <div id="custom-alert">
        <div class="alert-header">SYSTEM MESSAGE</div>
        <div class="alert-content" id="alert-message"></div>
    </div>

    <div id="auth-container" style="display: none;">
        <div class="auth-card">
            <h2>PLAYER LOGIN</h2>
            <div class="input-field">
                <label>E-MAIL ADDRESS</label>
                <input type="email" id="email" placeholder="hunter@association.com">
            </div>
            <div class="input-field">
                <label>PASSWORD</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <button class="btn-auth" onclick="login()">ENTER GATE</button>
            <button class="btn-google" onclick="loginGoogle()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="16">
                GOOGLE SYNC
            </button>
        </div>
    </div>

    <div class="main-container" id="app-content" style="display: none;">
        <header class="dashboard-header">
            <div>
                <h1>PLAYER STATUS</h1>
                <div style="display: flex; align-items: center; gap: 15px; margin-top: 15px;">
                    <div id="user-avatar" onclick="abrirConfigPerfil()"></div>
                    <div>
                        <span id="user-email-display" style="font-family: 'Orbitron'; color: var(--sl-blue); font-size: 0.9rem;"></span>
                        <br>
                        <button onclick="logout()" class="btn-logout">ABANDON QUEST</button>
                    </div>
                </div>
            </div>

            <div id="quest-creation-zone">
                <button id="btn-show-input" onclick="toggleInput(true)" style="background: var(--sl-blue); border: none; padding: 10px 20px; font-family: 'Orbitron'; cursor: pointer; font-weight: bold;">+ NEW QUEST</button>
                <div id="input-container" style="display: none; gap: 10px;">
                    <input type="text" id="habitInput" placeholder="NEW QUEST NAME..." style="background: #020617; border: 1px solid var(--sl-blue); color: white; padding: 8px; font-family: 'Rajdhani';">
                    <button onclick="adicionarHabito()" style="background: var(--sl-blue); border: none; padding: 8px 15px; cursor: pointer; font-weight: bold;">ACCEPT</button>
                </div>
            </div>

            <div style="display: flex; flex-direction: column; align-items: center;">
                <div class="chart-container">
                    <canvas id="progressChart"></canvas>
                    <div id="percentage-label">0%</div>
                </div>
                <span style="font-size: 0.6rem; color: var(--sl-blue); font-family: 'Orbitron'; margin-top: 5px;">COMPLETION</span>
            </div>
        </header>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr id="header-row">
                        <th class="sticky-col">DAILY QUESTS</th>
                    </tr>
                </thead>
                <tbody id="habit-grid"></tbody>
            </table>
        </div>
    </div>

    <script type="module" src="index.js"></script>
</body>
</html>
